<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burst Timestamp Camera (Time on Top)</title>
    <style>
        :root {
            --primary: #007aff;
            --danger: #ff3b30;
            --success: #34c759;
            --warning: #ff9500;
            --bg: #121212;
            --surface: #1e1e1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin: 15px 0 5px 0; font-size: 1.4rem; font-weight: 600; text-align: center; }
        
        #location-status {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 15px;
            text-align: center;
            padding: 0 10px;
            width: 90%;
            max-width: 650px;
        }

        .camera-container {
            position: relative;
            width: 95%;
            max-width: 480px; 
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 95%;
            max-width: 650px;
        }

        button {
            padding: 14px 16px;
            font-size: 0.95rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, opacity 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #snap-btn { background-color: var(--danger); color: white; flex-grow: 3; font-size: 1.1rem; }
        #gallery-btn { background-color: var(--primary); color: white; flex-grow: 2; }
        #refresh-btn { background-color: var(--warning); color: white; flex-grow: 1; padding: 14px 14px; }

        .gallery-container {
            display: none;
            width: 95%;
            max-width: 650px;
            margin-top: 10px;
            border-top: 1px solid #333;
            padding-top: 20px;
            padding-bottom: 50px;
        }

        .gallery-container.active { display: block; }
        
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .gallery-header h2 { margin: 0; font-size: 1.2rem; }
        
        .action-links { display: flex; gap: 10px; }
        .btn-small { padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; }
        .btn-download-all { background: var(--success); color: white; }
        .btn-clear-all { background: #444; color: #ff453a; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .photo-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: var(--surface);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }

        .photo-card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            cursor: zoom-in; 
        }

        .card-buttons {
            display: flex;
            border-top: 1px solid #2c2c2e;
        }

        .card-btn {
            flex: 1;
            padding: 8px 0;
            font-size: 0.75rem;
            border-radius: 0;
            background: transparent;
            color: #fff;
        }
        .card-btn-dl { color: var(--success); }
        .card-btn-del { color: var(--danger); border-left: 1px solid #2c2c2e; }
        .card-btn:hover { background: #2c2c2e; }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { position: relative; max-width: 95vw; max-height: 90vh; }
        .modal-content img { width: 100%; max-height: 90vh; object-fit: contain; border-radius: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: -40px; right: 0; color: #fff; font-size: 35px; font-weight: bold; cursor: pointer; z-index: 10000; }
        .close-modal:hover { color: var(--danger); }

        .flash { animation: flashEffect 0.15s ease-out; }
        @keyframes flashEffect {
            0% { opacity: 0.3; background-color: #fff; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>📸 Burst Timestamp Cam</h1>
    <div id="location-status">🛰️ กำลังตรวจสอบสิทธิ์และพิกัด...</div>

    <div class="camera-container" id="cam-box">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="snap-btn" disabled>⚡ ถ่ายรูป (แชะ!)</button> 
        <button id="gallery-btn">🖼️ คลังรูป (<span id="count">0</span>)</button>
        <button id="refresh-btn" title="รีเฟรชกล้องและพิกัด">🔄 รีเฟรช</button>
    </div>

    <div class="gallery-container" id="gallery-section">
        <div class="gallery-header">
            <h2>📦 รูปภาพในเครื่อง</h2>
            <div class="action-links">
                <button id="dl-all-btn" class="btn-small btn-download-all">💾 โหลดทั้งหมด</button>
                <button id="clear-all-btn" class="btn-small btn-clear-all">🗑️ ล้างคลัง</button>
            </div>
        </div>
        <div class="grid" id="gallery-grid"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div id="image-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <img id="preview-img" src="" alt="Full Preview">
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snapBtn = document.getElementById('snap-btn');
        const galleryBtn = document.getElementById('gallery-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const gallerySection = document.getElementById('gallery-section');
        const galleryGrid = document.getElementById('gallery-grid');
        const countSpan = document.getElementById('count');
        const locationStatus = document.getElementById('location-status');
        const camBox = document.getElementById('cam-box');
        const dlAllBtn = document.getElementById('dl-all-btn');
        const clearAllBtn = document.getElementById('clear-all-btn');
        
        const modal = document.getElementById('image-modal');
        const previewImg = document.getElementById('preview-img');
        const closeModalBtn = document.getElementById('close-modal');

        let db;
        let locData = { subdistrict: "", district: "", province: "" };
        let isCameraReady = false;
        let activeStream = null;

        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            alert("⚠️ แพลตฟอร์มต้องการความปลอดภัยระบบ HTTPS");
        }

        const request = indexedDB.open("BurstCamFinalDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("photos", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            updatePhotoCount();
        };

        function initLocation() {
            if (!navigator.geolocation) {
                locationStatus.innerText = `⚠️ เตือน: เบราว์เซอร์ไม่รองรับระบบ GPS`;
                return;
            }

            locationStatus.innerText = "🛰️ กำลังค้นหาพิกัดที่ตั้งล่าสุด...";
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const rawLat = position.coords.latitude;
                    const rawLon = position.coords.longitude;
                    
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${rawLat}&lon=${rawLon}&zoom=14&addressdetails=1`, {
                            headers: { 'Accept-Language': 'th' }
                        });
                        const data = await res.json();
                        
                        if(data && data.address) {
                            const addr = data.address;
                            locData.subdistrict = addr.suburb || addr.village || addr.quarter || addr.neighbourhood || "";
                            locData.district = addr.city_district || addr.district || addr.town || addr.county || "";
                            locData.province = addr.state || addr.province || addr.city || "";
                            
                            let showText = [locData.subdistrict, locData.district, locData.province].filter(Boolean).join(", ");
                            locationStatus.innerText = showText ? `📍 ${showText}` : `🛰️ ${rawLat.toFixed(4)}, ${rawLon.toFixed(4)}`;
                        }
                    } catch (e) {
                        locationStatus.innerText = `🛰️ พิกัดปัจจุบัน: ${rawLat.toFixed(4)}, ${rawLon.toFixed(4)}`;
                    }
                },
                (err) => {
                    locationStatus.innerText = `⚠️ ไม่สามารถเข้าถึงตำแหน่งพิกัดได้ (แสดงเฉพาะเวลา)`;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function initCamera() {
            isCameraReady = false;
            snapBtn.disabled = true;

            if (activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
            }

            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "environment", 
                    width: { ideal: 1920 }, 
                    height: { ideal: 1440 },
                    aspectRatio: { ideal: 4/3 }
                }, 
                audio: false 
            })
            .then(stream => { 
                activeStream = stream;
                video.srcObject = stream;
                isCameraReady = true;
                snapBtn.disabled = false;
                
                const settings = stream.getVideoTracks()[0].getSettings();
                const videoRatio = settings.width / settings.height;
                const targetRatio = 4 / 3;
                
                let canvasWidth = settings.width;
                let canvasHeight = settings.height;
                
                if (Math.abs(videoRatio - targetRatio) > 0.05) {
                    if (videoRatio > targetRatio) {
                        canvasWidth = canvasHeight * targetRatio;
                    } else {
                        canvasHeight = canvasWidth / targetRatio;
                    }
                }
                
                canvas.width = Math.min(canvasWidth, 1920); 
                canvas.height = Math.min(canvasHeight, 1440); 
            })
            .catch(err => { 
                isCameraReady = false;
                locationStatus.innerText = "❌ เปิดกล้องไม่สำเร็จ!";
            });
        }

        initLocation();
        initCamera();

        refreshBtn.addEventListener('click', () => {
            refreshBtn.innerText = "⏳ รอ...";
            refreshBtn.disabled = true;
            initLocation();
            initCamera();
            setTimeout(() => {
                refreshBtn.innerText = "🔄 รีเฟรช";
                refreshBtn.disabled = false;
            }, 1000);
        });

        function getTimestampData() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            
            let hours = now.getHours();
            const mins = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            
            return {
                text: `${day}/${month}/${year} ${String(hours).padStart(2, '0')}:${mins} ${ampm}`,
                file: `${day}-${month}-${year}_${hours}-${mins}${ampm}`
            };
        }

        snapBtn.addEventListener('click', () => {
            if(!isCameraReady) return;
            const ctx = canvas.getContext('2d');
            
            try {
                const settings = video.srcObject.getVideoTracks()[0].getSettings();
                const vW = settings.width;
                const vH = settings.height;
                const cW = canvas.width;
                const cH = canvas.height;
                
                const ratio = Math.max(cW / vW, cH / vH);
                const x = (vW * ratio - cW) / (2 * ratio);
                const y = (vH * ratio - cH) / (2 * ratio);
                
                ctx.drawImage(video, y, x, cW / ratio, cH / ratio, 0, 0, cW, cH);

                const ts = getTimestampData();

                // ✅ ปรับเรียงลำดับใหม่: จังหวัดอยู่ล่างสุด -> อำเภอ -> ตำบล -> เวลาอยู่บนสุด
                const lines = []; 
                if (locData.province) lines.push(locData.province);       // ล่างสุด
                if (locData.district) lines.push(locData.district);       // แถวสอง (นับจากล่าง)
                if (locData.subdistrict) lines.push(locData.subdistrict); // แถวสาม (นับจากล่าง)
                lines.push(ts.text);                                      // บนสุด

                const fontSize = Math.max(cH * 0.035, 24); 
                ctx.font = `bold ${fontSize}px Helvetica, Arial, sans-serif`;
                ctx.fillStyle = "#ffffff";
                ctx.textAlign = "left"; 
                
                ctx.shadowColor = "rgba(0, 0, 0, 0.85)";
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                // กำหนดระยะห่างปลอดภัยขอบขวาและขอบล่าง
                let currentY = cH - (fontSize * 1.3); 
                const rightPadding = cW * 0.06;       

                for (let i = 0; i < lines.length; i++) {
                    const textWidth = ctx.measureText(lines[i]).width;
                    const xPos = cW - rightPadding - textWidth;
                    
                    ctx.fillText(lines[i], xPos, currentY);
                    currentY -= (fontSize * 1.4); // ขยับขึ้นไปวาดบรรทัดถัดไป
                }

                ctx.shadowColor = "transparent";

                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

                const transaction = db.transaction(["photos"], "readwrite");
                transaction.objectStore("photos").add({ image: dataUrl, filename: `IMG_${ts.file}.jpg` });

                transaction.onsuccess = () => {
                    updatePhotoCount();
                    if (gallerySection.classList.contains('active')) loadGallery();
                    
                    camBox.classList.add('flash');
                    setTimeout(() => camBox.classList.remove('flash'), 150);
                };
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการบันทึกภาพ: " + error.message);
            }
        });

        galleryBtn.addEventListener('click', () => {
            gallerySection.classList.toggle('active');
            if (gallerySection.classList.contains('active')) loadGallery();
        });

        function updatePhotoCount() {
            if (!db) return;
            const request = db.transaction(["photos"], "readonly").objectStore("photos").count();
            request.onsuccess = () => { countSpan.innerText = request.result; };
        }

        function loadGallery() {
            galleryGrid.innerHTML = "";
            if(!db) return;
            db.transaction(["photos"], "readonly").objectStore("photos").openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const record = cursor.value;
                    const id = record.id;

                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `
                        <img src="${record.image}" onclick="openPreview('${record.image}')" title="คลิกเพื่อขยายดูรูป">
                        <div class="card-buttons">
                            <button class="card-btn card-btn-dl" onclick="downloadSingle('${record.image}', '${record.filename}')">💾 โหลด</button>
                            <button class="card-btn card-btn-del" onclick="deleteSingle(${id})">🗑️ ลบ</button>
                        </div>
                    `;
                    galleryGrid.appendChild(card);
                    cursor.continue();
                }
            };
        }

        window.openPreview = (imgSrc) => {
            previewImg.src = imgSrc;
            modal.classList.add('active');
        };

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        window.downloadSingle = (url, name) => {
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
        };

        window.deleteSingle = (id) => {
            const numericId = Number(id);
            const transaction = db.transaction(["photos"], "readwrite");
            const request = transaction.objectStore("photos").delete(numericId);
            
            request.onsuccess = () => {
                updatePhotoCount();
                loadGallery();
            };
        };

        dlAllBtn.addEventListener('click', () => {
            db.transaction(["photos"], "readonly").objectStore("photos").openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    downloadSingle(cursor.value.image, cursor.value.filename);
                    setTimeout(() => { cursor.continue(); }, 120);
                }
            };
        });

        clearAllBtn.addEventListener('click', () => {
            if (confirm("ต้องการเคลียร์ล้างคลังรูปทั้งหมดใช่ไหม?")) {
                const transaction = db.transaction(["photos"], "readwrite");
                transaction.objectStore("photos").clear();
                transaction.onsuccess = () => {
                    updatePhotoCount();
                    loadGallery();
                };
            }
        });
    </script>
</body>
</html>
